<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }

        background: rgba(29, 32, 38, 0.6);

        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
      }
      .ambient-orb {
        position: absolute;
        width: 600px;
        height: 600px;
        border-radius: 50%;

<body class="bg-surface text-on-surface font-body min-h-screen selection:bg-primary-container selection:text-on-primary-container relative overflow-hidden flex flex-col">
<!-- Ambient Background Orbs -->
<div class="ambient-orb bg-primary-container top-[-10%] left-[-10%]"></div>
<div class="ambient-orb bg-secondary-container bottom-[-10%] right-[-10%]"></div>
<!-- TopAppBar -->
<header class="fixed top-0 w-full flex items-center justify-between px-6 h-20 z-50 bg-transparent no-border no-shadow">
<div class="text-2xl font-semibold tracking-[-0.04em] text-[#adc6ff] font-['Inter']">PomoTune</div>
<div class="flex items-center gap-4">
<button class="text-[#c1c6d7] hover:text-[#adc6ff] transition-colors scale-95 active:duration-100">
<span class="material-symbols-outlined" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-4 pt-20 pb-20">
<div class="w-full max-w-md">
<!-- Branding Header -->
<div class="text-center mb-8">
<h1 class="text-4xl md:text-5xl font-extrabold tracking-tighter text-primary mb-2">PomoTune</h1>
<p class="text-on-surface-variant text-sm tracking-widest uppercase font-medium">The Deep Focus Sanctuary</p>
</div>
<!-- Login Card -->
<div class="glass-card rounded-[2rem] p-8 md:p-12 relative overflow-hidden">
<!-- Signature Glow Edge -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-gradient-to-r from-primary/20 via-primary/5 to-transparent"></div>
<form class="space-y-6">
<div>
<label class="block text-[0.6875rem] uppercase tracking-[0.15em] text-on-surface-variant mb-3 px-1">Email Address</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/30 transition-all outline-none" placeholder="name@focus.com" type="email"/>
</div>
<div>
<label class="block text-[0.6875rem] uppercase tracking-[0.15em] text-on-surface-variant mb-3 px-1">Password</label>
<input class="w-full bg-surface-container-low border-none rounded-xl px-4 py-4 text-on-surface placeholder:text-outline/50 focus:ring-1 focus:ring-primary/30 transition-all outline-none" placeholder="••••••••" type="password"/>
</div>
<div class="pt-2">
<button class="w-full bg-primary-container text-on-primary-container font-bold py-4 rounded-full hover:shadow-[0_0_20px_rgba(75,142,255,0.3)] transition-all active:scale-[0.98]" type="submit">
                            Login to Sanctuary
                        </button>
</div>
<div class="relative flex items-center py-4">
<div class="flex-grow border-t border-outline-variant/30"></div>
<span class="flex-shrink mx-4 text-[0.6875rem] uppercase tracking-widest text-outline">or</span>
<div class="flex-grow border-t border-outline-variant/30"></div>
</div>
<button class="w-full bg-surface-container-high hover:bg-surface-bright text-on-surface py-4 rounded-full flex items-center justify-center gap-3 transition-colors border border-outline-variant/10" type="button">
<svg class="w-5 h-5" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="currentColor"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="currentColor"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="currentColor"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.66l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="currentColor"></path>
</svg>
<span class="font-medium text-sm">Continue with Google</span>
</button>
</form>
<div class="mt-10 text-center">
<p class="text-on-surface-variant text-xs">
                        Don't have an account? 
                        <a class="text-primary font-semibold hover:underline ml-1 decoration-primary/30 underline-offset-4" href="#">Sign Up</a>
</p>
</div>
</div>
<!-- Focus Quote / Aesthetic Element -->
<div class="mt-8 text-center opacity-40">
<p class="text-[0.625rem] uppercase tracking-[0.2em] italic">Quiet the noise, find your rhythm.</p>
</div>
</div>
</main>

<footer class="fixed bottom-0 w-full flex justify-center items-center gap-8 pb-8 z-50 bg-transparent no-border no-shadow">
<div class="font-['Inter'] text-[0.6875rem] uppercase tracking-[0.1em] text-[#c1c6d7] flex gap-8">
<span class="opacity-80">© 2024 PomoTune. The Deep Focus Sanctuary.</span>
<div class="flex gap-6">
<a class="hover:text-[#adc6ff] transition-colors opacity-80 hover:opacity-100" href="#">Privacy</a>
<a class="hover:text-[#adc6ff] transition-colors opacity-80 hover:opacity-100" href="#">Terms</a>
<a class="hover:text-[#adc6ff] transition-colors opacity-80 hover:opacity-100" href="#">Support</a>
</div>
</div>
</footer>
